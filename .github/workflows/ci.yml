name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master

jobs:
  # ─── JOB 1: BUILD ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore TechnicalService
        run: dotnet restore src/Services/TechnicalService/TechnicalService.API/TechnicalService.API.csproj

      - name: Restore RoutingService
        run: dotnet restore src/Services/RoutingService/RoutingService.API/RoutingService.API.csproj

      - name: Restore PersonnelService
        run: dotnet restore src/Services/PersonnelService/PersonnelService.API/PersonnelService.API.csproj

      - name: Restore AggregatorService
        run: dotnet restore AggregatorService/AggregatorService.csproj

      - name: Restore ApiGateway
        run: dotnet restore ApiGateway/ApiGateway.csproj

      - name: Restore PersonnelService.Tests
        run: dotnet restore src/Services/PersonnelService/PersonnelService.Tests/PersonnelService.Tests.csproj

      - name: Build TechnicalService
        run: |
          dotnet build src/Services/TechnicalService/TechnicalService.API/TechnicalService.API.csproj \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Build RoutingService
        run: |
          dotnet build src/Services/RoutingService/RoutingService.API/RoutingService.API.csproj \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Build PersonnelService
        run: |
          dotnet build src/Services/PersonnelService/PersonnelService.API/PersonnelService.API.csproj \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Build AggregatorService
        run: |
          dotnet build AggregatorService/AggregatorService.csproj \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

      - name: Build ApiGateway
        run: |
          dotnet build ApiGateway/ApiGateway.csproj \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false

  # ─── JOB 2: TEST ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore test project
        run: dotnet restore src/Services/PersonnelService/PersonnelService.Tests/PersonnelService.Tests.csproj

      - name: Run unit tests
        run: |
          dotnet test src/Services/PersonnelService/PersonnelService.Tests/PersonnelService.Tests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/

  # ─── JOB 3: STATIC ANALYSIS (SonarCloud) ─────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: |
          dotnet restore src/Services/TechnicalService/TechnicalService.API/TechnicalService.API.csproj
          dotnet restore src/Services/RoutingService/RoutingService.API/RoutingService.API.csproj
          dotnet restore src/Services/PersonnelService/PersonnelService.API/PersonnelService.API.csproj
          dotnet restore AggregatorService/AggregatorService.csproj
          dotnet restore ApiGateway/ApiGateway.csproj
          dotnet restore src/Services/PersonnelService/PersonnelService.Tests/PersonnelService.Tests.csproj

      - name: Begin SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/bin/**,**/obj/**,**/AppHost/**"

      - name: Build for SonarCloud
        run: |
          dotnet build src/Services/TechnicalService/TechnicalService.API/TechnicalService.API.csproj \
            --configuration Release --no-restore /p:TreatWarningsAsErrors=false
          dotnet build src/Services/RoutingService/RoutingService.API/RoutingService.API.csproj \
            --configuration Release --no-restore /p:TreatWarningsAsErrors=false
          dotnet build src/Services/PersonnelService/PersonnelService.API/PersonnelService.API.csproj \
            --configuration Release --no-restore /p:TreatWarningsAsErrors=false
          dotnet build AggregatorService/AggregatorService.csproj \
            --configuration Release --no-restore /p:TreatWarningsAsErrors=false
          dotnet build ApiGateway/ApiGateway.csproj \
            --configuration Release --no-restore /p:TreatWarningsAsErrors=false

      - name: Run tests with coverage
        run: |
          dotnet test src/Services/PersonnelService/PersonnelService.Tests/PersonnelService.Tests.csproj \
            --configuration Release \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"