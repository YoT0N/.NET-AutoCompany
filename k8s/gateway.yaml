apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ReverseProxy__Clusters__technical-cluster__Destinations__destination1__Address
              value: "http://technicalservice-api:80"
            - name: ReverseProxy__Clusters__routing-cluster__Destinations__destination1__Address
              value: "http://routing-api:80"
            - name: ReverseProxy__Clusters__personnel-cluster__Destinations__destination1__Address
              value: "http://personnel-api:80"
            - name: ReverseProxy__Clusters__aggregator-cluster__Destinations__destination1__Address
              value: "http://aggregator:80"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort